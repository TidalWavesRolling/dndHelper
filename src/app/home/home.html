<p-splitter [style] = "{ height: '300px', 'margin': '50px' }">
    <ng-template pTemplate>
        <div class="flex items-center justify-center h-full w-full">
            <p-card>
                <span appCountUp [appCountUp]="targetNumber" [duration]="animationDuration" class="text-9xl font-bold text-primary">0</span>
            </p-card>
        </div>
    </ng-template>
    <ng-template pTemplate>
    
    </ng-template>
</p-splitter>

<p-card class="flex">
    <p-button (onClick)="add5000()">
        Add 5000
    </p-button>
    <p-button (onClick)="sub5000()">
        Sub 5000
    </p-button>
</p-card>
